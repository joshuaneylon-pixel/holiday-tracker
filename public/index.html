<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Holiday Tracker</title>
  <link rel="icon" type="image/png" href="PND-logo-red-1.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,300;0,14..32,400;0,14..32,500;0,14..32,600;0,14..32,700;0,14..32,800;1,14..32,400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ── Login ──────────────────────────────────────────────────────────── -->
  <div id="login-screen" class="login-screen">
    <div class="login-bg"><div class="login-bg-orb"></div></div>
    <div class="login-card">
      <div class="login-logo">
        <img src="PND-logo-red-1.png" alt="PN Daly Ltd" class="login-logo-img" />
        <h1 class="login-title">Holiday Tracker</h1>
        <p class="login-sub">Sign in to manage your time off</p>
      </div>
      <form id="login-form" class="login-form">
        <div class="field">
          <label class="field-label">Email address</label>
          <input id="login-email" type="email" class="input" placeholder="you@company.com" autocomplete="email" />
        </div>
        <div class="field">
          <label class="field-label">Password</label>
          <input id="login-password" type="password" class="input" placeholder="••••••••" autocomplete="current-password" />
        </div>
        <div id="login-error" class="login-error hidden"></div>
        <button type="submit" class="btn btn-primary btn-full btn-lg" id="login-btn">Sign in</button>
      </form>
    </div>
  </div>

  <!-- ── App Shell ──────────────────────────────────────────────────────── -->
  <div id="app" class="app hidden">

    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="logo">
          <img src="PND-logo-red-1.png" alt="PN Daly Ltd" class="sidebar-logo-img" />
          <span class="logo-text">Holiday Tracker</span>
        </div>
      </div>
      <nav class="sidebar-nav" id="sidebar-nav"></nav>
      <div class="sidebar-footer">
        <button class="sidebar-request-btn" onclick="openHolidayModal()">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          New Request
        </button>
        <div class="sidebar-user" id="sidebar-user"></div>
      </div>
    </aside>

    <main class="main-content" id="main-content"></main>

  </div>

  <!-- ── Modal ──────────────────────────────────────────────────────────── -->
  <div id="modal-overlay" class="modal-overlay hidden" onclick="handleOverlayClick(event)">
    <div class="modal" id="modal" onclick="event.stopPropagation()"></div>
  </div>

  <!-- ── Toasts ─────────────────────────────────────────────────────────── -->
  <div id="toast-container" class="toast-container"></div>

  <script src="app.js?v=2"></script>
</body>
</html>
